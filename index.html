<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKS CINEMA | Collections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-purple: #7b2cbf;
            --bg-dark: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent-purple); }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { 
            font-size: 13px; font-weight: 600; color: var(--text-dim); 
            text-decoration: none; text-transform: uppercase; transition: 0.3s;
        }
        nav ul li a:hover { color: #fff; }

        /* Hero */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 4%;
        }

        .video-background iframe {
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 1;
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.95) 10%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.9) 100%),
                        linear-gradient(to top, var(--bg-dark) 0%, transparent 40%);
            z-index: 2;
        }

        .hero-content { max-width: 750px; z-index: 3; position: relative; }
        .hero-content h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 900; line-height: 1.1; text-transform: uppercase; }
        .hero-content h1 span { display: block; font-size: 0.55em; letter-spacing: 6px; font-weight: 300; margin-top: 5px; color: var(--accent-purple); }

        /* Collections */
        .container { padding: 80px 4%; }
        .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .section-header h2 { font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        .line { flex-grow: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .movie-card:hover { transform: scale(1.05); border-color: var(--accent-purple); }
        .movie-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-card-info { padding: 15px; text-align: center; }
        .movie-card-info h3 { font-size: 16px; text-transform: uppercase; }

        /* MODAL (Detail Page Overlay) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none; /* Hidden by default */
            overflow-y: auto;
            padding: 50px 4%;
        }

        .modal-content {
            max-width: 1000px;
            margin: 0 auto;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header-img { width: 100%; height: 400px; object-fit: cover; }
        .modal-body { padding: 40px; }
        .modal-title { font-size: 32px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .modal-meta { color: var(--accent-purple); font-weight: bold; margin-bottom: 20px; }
        .modal-desc { line-height: 1.8; color: var(--text-dim); margin-bottom: 30px; white-space: pre-line; }

        .dl-box {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--accent-purple);
        }

        .dl-link {
            display: block;
            background: var(--accent-purple);
            color: white;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: 900;
        }

        .close-modal {
            position: fixed;
            top: 20px; right: 40px;
            font-size: 40px; color: white;
            cursor: pointer; z-index: 1001;
        }

    </style>
</head>
