<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE CLOUD | Avatar Collection</title>
    <style>
        :root {
            --bg-black: #050505;
            --panel-bg: #111111;
            --accent-red: #e50914;
            --avatar-blue: #00d4ff;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        html { scroll-behavior: smooth; }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-weight: 900; 
            font-size: 24px; 
            color: var(--accent-red); 
            text-decoration: none; 
            letter-spacing: 1px; 
        }
        .logo span { color: white; }

        .nav-links { display: flex; gap: 30px; margin-left: 50px; }
        .nav-links a { 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        /* --- Hero / Upcoming Section --- */
        .hero {
            height: 80vh;
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .video-background iframe { width: 100%; height: 100%; border: none; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-black) 5%, transparent 50%),
                        linear-gradient(to right, rgba(0,0,0,0.9) 15%, transparent 70%);
            z-index: 1;
        }

        .hero-content { 
            position: relative; 
            z-index: 10; 
            padding-left: 5%; 
            max-width: 800px; 
        }
        
        .hero-content h1 { 
            font-size: 4rem; 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: 900;
            line-height: 0.9;
        }

        /* --- Collection Row --- */
        .collection-area {
            padding: 40px 5% 20px 5%;
            background: var(--bg-black);
            position: relative;
            z-index: 20;
        }

        .section-header {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--avatar-blue);
            text-transform: uppercase;
        }

        .horizontal-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: none;
        }

        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .movie-card {
            flex: 0 0 200px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .movie-card:hover { transform: scale(1.08); }

        .movie-card img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid transparent;
        }

        .movie-card:hover img { border-color: var(--avatar-blue); }

        /* --- Bottom Info Panel (The "Down" Detail Section) --- */
        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            border-top: 2px solid var(--avatar-blue);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 40px 5%;
            box-sizing: border-box;
            display: none; /* Hidden by default */
        }

        .bottom-panel.active {
            display: block;
            transform: translateY(0);
        }

        .panel-layout {
            display: flex;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .panel-close {
            position: absolute;
            top: -20px;
            right: 0;
            font-size: 30px;
            cursor: pointer;
            color: white;
        }

        .panel-poster {
            width: 200px;
            border-radius: 8px;
            display: block;
        }

        .panel-info h2 { margin: 0 0 10px 0; color: var(--avatar-blue); font-size: 32px; }
        
        .panel-meta {
            font-size: 14px;
            color: #46d369;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .panel-desc {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
            max-width: 700px;
        }

        .dl-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: var(--avatar-blue);
            color: #000;
            text-decoration: none;
            font-weight: 800;
            border-radius: 5px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .panel-poster { display: none; }
            .hero-content h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">CINE <span>CLOUD</span></a>
        <div class="nav-links">
            <a href="#upcoming">Upcoming</a>
            <a href="#collections">Avatar Collection</a>
            <a href="#">Dubbed</a>
            <a href="#">Action</a>
        </div>
    </nav>

    <div id="upcoming" class="hero">
        <div class="video-background">
            <iframe src="https://www.youtube.com/embed/8TZMtslA3UY?autoplay=1&mute=1&controls=0&loop=1&playlist=8TZMtslA3UY" allow="autoplay"></iframe>
        </div>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>SPIDER-MAN<br>BRAND NEW DAY</h1>
        </div>
    </div>

    <div id="collections" class="collection-area">
        <div class="section-header">Avatar Collection</div>
        <div class="horizontal-scroll">
            
            <div class="movie-card" onclick="showPanel('avatar1')">
                <img src="https://cinesubz.lk/wp-content/uploads/2026/03/gKY6q7SjCkAU6FqvqWybDYgUKIF.jpg" alt="Avatar 2009">
            </div>

            <div class="movie-card" onclick="showPanel('avatar2')">
                <img src="https://cinesubz.lk/wp-content/uploads/2026/03/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg" alt="Avatar 2022">
            </div>

            <div class="movie-card" onclick="showPanel('avatar3')">
                <img src="https://cinesubz.lk/wp-content/uploads/2026/03/Avatar-Fire-and-Ash-2025-WEB.jpg" alt="Avatar 2025">
            </div>

        </div>
    </div>

    <div id="detailsPanel" class="bottom-panel">
        <div class="panel-layout">
            <div class="panel-close" onclick="hidePanel()">&times;</div>
            <img id="panelImg" class="panel-poster" src="" alt="Poster">
            <div class="panel-info">
                <h2 id="panelTitle">Movie Title</h2>
                <div id="panelMeta" class="panel-meta">IMDb: 0.0</div>
                <div id="panelDesc" class="panel-desc">Description goes here...</div>
                <a id="panelDl" href="#" class="dl-btn">Download 720p</a>
            </div>
        </div>
    </div>

    <script>
        const movieData = {
            avatar1: {
                title: "Avatar (2009)",
                img: "https://cinesubz.lk/wp-content/uploads/2026/03/gKY6q7SjCkAU6FqvqWybDYgUKIF.jpg",
                meta: "BluRay IMDb: 7.9 | 162 min | 26,414 Views",
                desc: "Director: James Cameron | Country: UK, USA | Year: 2009. An epic journey to Pandora.",
                link: "https://bot6.sume321.online/Avatar%20(2009)%20English%20BluRay-%5BCineSubz.co%5D-720p.mp4?token=tddju8.UKK8YaHCvSLAQp-anmzm7e",
                showBtn: true
            },
            avatar2: {
                title: "Avatar: The Way of Water",
                img: "https://cinesubz.lk/wp-content/uploads/2026/03/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg",
                meta: "BluRay IMDb: 7.5 | Sinhala Subtitles",
                desc: "Director: James Cameron | Country: USA | Year: 2022. The story of the Sully family and the oceans of Pandora.",
                link: "https://bot6.sume321.online/Avatar%20The%20Way%20of%20Water%20(2022)%20English%20BluRay-%5BCineSubz.co%5D-480p.mp4?token=tddjpx.vxJB3n1fHAEKgc74i5W0iI",
                showBtn: true
            },
            avatar3: {
                title: "Avatar: Fire and Ash",
                img: "https://cinesubz.lk/wp-content/uploads/2026/03/Avatar-Fire-and-Ash-2025-WEB.jpg",
                meta: "WEB IMDb: 7.4 | Coming 2025",
                desc: "Director: James Cameron | The upcoming third chapter of the Avatar franchise.",
                link: "#",
                showBtn: false
            }
        };

        function showPanel(id) {
            const data = movieData[id];
            document.getElementById('panelTitle').innerText = data.title;
            document.getElementById('panelImg').src = data.img;
            document.getElementById('panelMeta').innerText = data.meta;
            document.getElementById('panelDesc').innerText = data.desc;
            
            const btn = document.getElementById('panelDl');
            if(data.showBtn) {
                btn.style.display = "inline-block";
                btn.href = data.link;
            } else {
                btn.style.display = "none";
            }

            const panel = document.getElementById('detailsPanel');
            panel.classList.add('active');
        }

        function hidePanel() {
            document.getElementById('detailsPanel').classList.remove('active');
        }
    </script>

</body>
</html>
