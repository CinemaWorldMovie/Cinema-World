<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKS CINEMA | Red & Black</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        .hero-gradient {
            background: linear-gradient(to right, #000000 30%, transparent 100%),
                        linear-gradient(to top, #000000 10%, transparent 40%);
        }

        .video-wrapper { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; overflow: hidden;
        }

        .video-wrapper iframe { 
            position: absolute; top: 50%; left: 50%;
            width: 120vw; height: 120vh; 
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .hidden { display: none; }
        .page-fade { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input, select, textarea { 
            background-color: #111111 !important; 
            border: 1px solid #333333 !important;
            color: white !important;
            outline: none;
        }
        input:focus { border-color: #ff0000 !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 4px; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-6 md:px-10 py-4 bg-[#000000] sticky top-0 z-50 border-b border-[#ff0000]/40">
        <div class="flex items-center space-x-8">
            <h1 class="text-2xl font-bold tracking-tighter text-white cursor-pointer" onclick="showView('home-view')">
                FLICKS <span class="text-[#ff0000]">CINEMA</span>
            </h1>
            <div class="hidden md:flex space-x-6 text-gray-400 font-medium text-xs uppercase tracking-widest">
                <button onclick="showView('home-view')" class="hover:text-[#ff0000] transition">Home</button>
                <button onclick="navToSection('pirates-section')" class="hover:text-[#ff0000] transition">Movies</button>
                <button onclick="navToSection('upcoming-section')" class="hover:text-[#ff0000] transition">Upcoming</button>
                <button onclick="navToSection('pirates-section')" class="hover:text-[#ff0000] transition">Action</button>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-white">
            <i class="fas fa-search cursor-pointer hover:text-[#ff0000] transition"></i>
            <i class="fas fa-user-circle text-2xl cursor-pointer hover:text-[#ff0000] transition" onclick="showView('profile-view')"></i>
        </div>
    </nav>

    <div id="home-view" class="view-container page-fade">
        <section class="relative h-[95vh] w-full overflow-hidden flex items-center">
            <div class="video-wrapper z-0 opacity-60">
                <iframe src="https://www.youtube.com/embed/8TZMtslA3UY?autoplay=1&mute=1&controls=0&loop=1&playlist=8TZMtslA3UY&vq=hd1080&rel=0&iv_load_policy=3" 
                        frameborder="0" allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="absolute inset-0 hero-gradient z-10"></div>
            
            <div class="relative z-20 px-6 md:px-16 max-w-4xl">
                <p class="text-[#ff0000] font-bold tracking-widest text-sm uppercase mb-3">World Premiere</p>
                <h2 class="text-7xl md:text-9xl font-black italic tracking-tighter mb-4 leading-tight text-white drop-shadow-2xl">SPIDER-MAN</h2>
                <p class="text-2xl md:text-3xl text-gray-200 mb-8 font-semibold uppercase tracking-[0.3em]">Brand New Day</p>
                <button onclick="openDetails('spider-man')" class="bg-[#ff0000] text-white px-14 py-4 rounded-sm font-bold text-lg hover:bg-white hover:text-black transition duration-300 shadow-2xl">
                    MOVIE INFO
                </button>
            </div>
        </section>

        <section id="upcoming-section" class="px-6 md:px-16 py-20 relative z-30 border-t border-[#222] bg-[#050505]">
            <h3 class="text-xl font-bold mb-8 flex items-center uppercase tracking-widest"><span class="text-[#ff0000] mr-3">|</span> Upcoming Releases</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div onclick="openDetails('spider-man')" class="bg-[#111111] border border-[#333333] hover:border-[#ff0000] transition-all cursor-pointer group">
                    <div class="relative overflow-hidden">
                        <img src="https://i.ytimg.com/vi/8TZMtslA3UY/maxresdefault.jpg" class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition duration-500 opacity-50">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="bg-[#ff0000] text-white px-5 py-2 text-xs font-bold uppercase tracking-widest">Available 2026</span>
                        </div>
                    </div>
                    <div class="p-4 text-center">
                        <h4 class="font-bold text-sm">Spider-Man: Brand New Day</h4>
                    </div>
                </div>
            </div>
        </section>

        <section id="pirates-section" class="px-6 md:px-16 py-20 relative z-30 border-t border-[#222] bg-[#000000]">
            <h3 class="text-xl font-bold mb-8 flex items-center uppercase tracking-widest"><span class="text-[#ff0000] mr-3">|</span> Pirates Collection</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div onclick="openDetails('black-pearl')" class="bg-[#111111] border border-[#333333] hover:border-[#ff0000] transition-all cursor-pointer group">
                    <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgXykIwpy0P1YDeOOFBS8N8mUrQvjToqEWbnsoHcvpgNIvMQgojspwu8u98WvV97LRCya0o8ExpvHe6DtBntXdx1J0yuLhigLhECsLxAV83y0dnqZlQxE4pAH154uQ5gI-wN9r30WBaf4LqTujERM0O-sjQ5FFdVpPKD0NoDpBpYwzHtXD5FZ93S_1n5bQ" class="w-full aspect-video object-cover group-hover:scale-105 transition duration-500">
                    <div class="p-5 font-bold text-lg">The Curse of the Black Pearl</div>
                </div>
                <div onclick="openDetails('dead-mans-chest')" class="bg-[#111111] border border-[#333333] hover:border-[#ff0000] transition-all cursor-pointer group">
                    <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgL7liGAoVrXZenNLsx0oSmWSbjh1w-qCRWEVkzLhaVBml_MeOspLMljZw9Nh6lGe5IxneYz5NnamZIr99xqR5m-jdlGXJNg7rjfV77bOJjy5VK0FHHHrbWL3jZCXPf0KFd-zFag4q1jw7cchCq1CJI0aG8V8SgUDzoC7moV07TwRF33jkklgy4ytvQ7rc" class="w-full aspect-video object-cover group-hover:scale-105 transition duration-500">
                    <div class="p-5 font-bold text-lg">Dead Man's Chest</div>
                </div>
            </div>
        </section>
    </div>

    <div id="details-view" class="view-container page-fade hidden">
        <div class="p-6"><button onclick="showView('home-view')" class="text-[#ff0000] font-bold hover:text-white transition uppercase text-sm"><i class="fas fa-arrow-left mr-2"></i> Return Home</button></div>
        <main class="px-6 md:px-20 py-10 max-w-7xl mx-auto grid lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1"><img id="det-img" src="" class="w-full shadow-2xl border border-[#333]"></div>
            <div class="lg:col-span-2">
                <h1 id="det-title" class="text-5xl md:text-7xl font-black italic tracking-tighter text-white"></h1>
                <h2 id="det-subtitle" class="text-xl text-[#ff0000] mb-8 font-bold uppercase tracking-widest"></h2>
                <div class="mb-10"><span id="det-year" class="bg-[#ff0000] text-white px-4 py-2 text-xs font-bold"></span></div>
                <h3 class="text-white text-xl font-bold border-b-2 border-[#ff0000] pb-2 uppercase w-32">Synopsis</h3>
                <p id="det-desc" class="text-gray-300 text-lg leading-relaxed mt-4"></p>
                
                <div id="download-section" class="mt-12">
                    <h3 class="text-white text-xl font-bold border-b-2 border-[#ff0000] pb-2 uppercase w-48 mb-6">Downloads</h3>
                    <div class="flex gap-4">
                        <a id="det-l1080" href="#" class="bg-[#ff0000] text-white px-10 py-4 font-bold hover:bg-white hover:text-black transition uppercase">1080p Bluray</a>
                        <a id="det-l720" href="#" class="border border-[#ff0000] text-[#ff0000] px-10 py-4 font-bold hover:bg-[#ff0000] hover:text-white transition uppercase">720p HD</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="profile-view" class="view-container page-fade hidden">
        <div class="max-w-4xl mx-auto px-6 py-12">
            <h2 class="text-3xl font-black italic mb-8 border-b-4 border-[#ff0000] pb-2 inline-block uppercase tracking-tighter">My Account</h2>
            <div class="grid md:grid-cols-2 gap-6 mb-16">
                <div class="space-y-1"><label class="text-xs font-bold text-[#ff0000] uppercase">User</label><input type="text" class="w-full p-4" value="Guest User"></div>
                <div class="space-y-1"><label class="text-xs font-bold text-[#ff0000] uppercase">Email</label><input type="email" class="w-full p-4" placeholder="Enter Email"></div>
            </div>

            <h2 class="text-3xl font-black italic mb-8 border-b-4 border-[#ff0000] pb-2 inline-block uppercase tracking-tighter">Request Content</h2>
            <form class="bg-[#111] p-8 border border-[#333] space-y-6">
                <input type="text" placeholder="Movie Title..." class="w-full p-4">
                <select class="w-full p-4 cursor-pointer">
                    <option>Subtitled (English)</option>
                    <option>Dubbed (Action)</option>
                </select>
                <textarea placeholder="Specific Details..." class="w-full p-4 h-32"></textarea>
                <button type="button" onclick="alert('Request Sent!')" class="bg-[#ff0000] text-white px-12 py-4 font-bold hover:bg-white hover:text-black transition uppercase">Submit Request</button>
            </form>
        </div>
    </div>

    <script>
        const movieDb = {
            'spider-man': { title: "SPIDER-MAN: BRAND NEW DAY", subtitle: "Rebirth 2026", img: "https://i.ytimg.com/vi/8TZMtslA3UY/maxresdefault.jpg", desc: "Peter Parker faces a world that has forgotten him. A new era begins as the web-slinger faces threats from his past and future mutation cycles.", year: "COMING 2026", hasDownload: false },
            'black-pearl': { title: "BLACK PEARL", subtitle: "Curse of the Pirates", img: "https://blogger.googleusercontent.com/img/a/AVvXsEgXykIwpy0P1YDeOOFBS8N8mUrQvjToqEWbnsoHcvpgNIvMQgojspwu8u98WvV97LRCya0o8ExpvHe6DtBntXdx1J0yuLhigLhECsLxAV83y0dnqZlQxE4pAH154uQ5gI-wN9r30WBaf4LqTujERM0O-sjQ5FFdVpPKD0NoDpBpYwzHtXD5FZ93S_1n5bQ", desc: "Blacksmith Will Turner teams up with eccentric pirate Jack Sparrow to save his love from cursed pirates.", year: "2003", hasDownload: true, l1080: "https://pixeldrain.com/u/AyChGtcW", l720: "https://pixeldrain.com/u/AyChGtcW" },
            'dead-mans-chest': { title: "DEAD MAN'S CHEST", subtitle: "Pirates Collection", img: "https://blogger.googleusercontent.com/img/a/AVvXsEgL7liGAoVrXZenNLsx0oSmWSbjh1w-qCRWEVkzLhaVBml_MeOspLMljZw9Nh6lGe5IxneYz5NnamZIr99xqR5m-jdlGXJNg7rjfV77bOJjy5VK0FHHHrbWL3jZCXPf0KFd-zFag4q1jw7cchCq1CJI0aG8V8SgUDzoC7moV07TwRF33jkklgy4ytvQ7rc", desc: "Jack Sparrow races to find the heart of Davy Jones to save his soul from eternal servitude.", year: "2006", hasDownload: true, l1080: "https://pixeldrain.com/u/rRsAELaH", l720: "https://pixeldrain.com/u/rRsAELaH" }
        };

        function showView(viewId) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'home-view') window.scrollTo(0,0);
        }

        function navToSection(sectionId) {
            if (document.getElementById('home-view').classList.contains('hidden')) {
                showView('home-view');
            }
            setTimeout(() => {
                const element = document.getElementById(sectionId);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        function openDetails(id) {
            const data = movieDb[id];
            document.getElementById('det-title').innerText = data.title;
            document.getElementById('det-subtitle').innerText = data.subtitle;
            document.getElementById('det-img').src = data.img;
            document.getElementById('det-desc').innerText = data.desc;
            document.getElementById('det-year').innerText = data.year;
            const dlSection = document.getElementById('download-section');
            if (data.hasDownload) {
                dlSection.classList.remove('hidden');
                document.getElementById('det-l1080').href = data.l1080;
                document.getElementById('det-l720').href = data.l720;
            } else { dlSection.classList.add('hidden'); }
            showView('details-view');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
