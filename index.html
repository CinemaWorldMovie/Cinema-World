<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKS CINEMA | Spider-Man</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-purple: #7b2cbf;
            --bg-dark: #050505;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden; /* Clean look without scrolling */
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .logo span { color: var(--accent-purple); }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav ul li {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        nav ul li:hover { color: #fff; }

        /* Fullscreen Video Background */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 4%;
        }

        .video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* User can't click the video to pause */
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Stronger overlay to keep text sharp over video */
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        .hero-content { 
            max-width: 900px; 
            z-index: 3; 
            position: relative;
        }

        .badge-row {
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--accent-purple);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero-content h1 span {
            display: block;
            font-size: 0.5em;
            color: var(--text-main);
            margin-top: 10px;
            letter-spacing: 5px;
            font-weight: 300;
        }

        .search-icon {
            font-size: 22px;
            cursor: pointer;
            opacity: 0.7;
        }

        .search-icon:hover { opacity: 1; }

    </style>
</head>
<body>

    <header>
        <div class="logo">FLICKS<span>CINEMA</span></div>
        <nav>
            <ul>
                <li>HOME</li>
                <li>MOVIES</li>
                <li>DUBBED</li>
            </ul>
        </nav>
        <div class="search-icon">🔍</div>
    </header>

    <main>
        <section class="hero">
            <div class="video-background">
                <iframe src="https://www.youtube.com/embed/8TZMtslA3UY?autoplay=1&mute=1&controls=0&loop=1&playlist=8TZMtslA3UY&rel=0&modestbranding=1" 
                        frameborder="0" allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div class="hero-overlay"></div>
            
            <div class="hero-content">
                <div class="badge-row">MARVEL STUDIOS PRESENTS</div>
                <h1>SPIDER - MAN<span>BRAND NEW DAY</span></h1>
            </div>
        </section>
    </main>

</body>
</html>
